name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 03:27 UTC) so the latest CodeQL queries
    # run against main even when there are no PRs.
    - cron: '27 3 * * 1'

# Avoid stacking redundant runs on the same branch.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (swift)
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write   # upload SARIF results to code scanning
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      # The .xcodeproj is generated by XcodeGen (not committed), and
      # project.yml references the PythonRuntime folder. CodeQL only needs
      # the code to COMPILE, not to run diarization — so create an empty
      # placeholder instead of the heavy `make bundle-diarization`.
      - name: Placeholder diarization bundle
        run: |
          mkdir -p Mila/Resources/PythonRuntime
          touch Mila/Resources/PythonRuntime/.keep

      # Initialize BEFORE the build so CodeQL's tracer observes Swift
      # compilation (manual build mode — autobuild can't drive XcodeGen).
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      - name: Generate Xcode project
        run: make project

      # The macos runner image ships a stale SwiftPM artifact cache that
      # occasionally rejects fresh downloads of the whisper xcframework.
      # Wipe it so package resolution starts clean (mirrors ci.yml).
      - name: Clear SwiftPM caches
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData/SourcePackages

      - name: Build for analysis
        run: |
          set -o pipefail
          xcodebuild build \
            -project Mila.xcodeproj \
            -scheme Mila \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            | cat

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
